$kind: http-request
description: |-
  Cập nhật trạng thái SOS sang DANG_XU_LY
  - Expected: 200 if valid, 401 if no session, 404 if not found
  - NOT 500
  - Requires: Valid {{sos_id}}, login session
url: http://{{baseUrl}}/api/tin-hieu-sos/cap-nhat-trang-thai/{{sos_id}}?status=DANG_XU_LY
method: POST
queryParams:
  status: DANG_XU_LY
scripts:
  - type: afterResponse
    code: |
      pm.test("Status is 200 (valid) or 401 (no session) or 404 (not found)", function() {

          const status = pm.response.code;

          pm.expect([200, 401, 404]).to.include(status);

      });



      pm.test("Status is NOT 500", function() {

          pm.response.to.not.have.status(500);

      });
    language: text/javascript
order: 4000
