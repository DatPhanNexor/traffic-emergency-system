$kind: http-request
description: |-
  Lấy danh sách SOS active
  - Expected: Status 200, List of active SOS
  - Requires: Login session
url: http://{{baseUrl}}/api/tin-hieu-sos/active
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200", function() {
          pm.response.to.have.status(200);
      });

      pm.test("Response is an array or list", function() {
          const body = pm.response.json();
          pm.expect(body).to.be.an('array');
      });
    language: text/javascript
order: 2000
