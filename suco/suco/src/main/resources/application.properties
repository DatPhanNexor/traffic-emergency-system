# resource: CanhBaoSuCo/suco/suco/src/main/resources/application.properties

spring.application.name=suco

server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3307/canhbao
spring.datasource.username=canhbao
spring.datasource.password=123456

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

server.max-http-header-size=10MB
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

server.tomcat.max-swallow-size=15MB
server.tomcat.max-http-form-post-size=15MB

jwt.secret=canhbao_secret_key_123456789_canhbao_secret_key
jwt.expiration=86400000

gemini.model=${GEMINI_MODEL:models/gemini-2.5-flash}
gemini.url=${GEMINI_URL:https://generativelanguage.googleapis.com/v1beta}
gemini.api.keys=${GEMINI_API_KEYS:your_api_key_1,your_api_key_2,your_api_key_3}

MAPBOX_PUBLIC_TOKEN=dummy-mapbox-token