$kind: http-request
description: |-
  Negative test: Update SOS với ID không tồn tại
  - Expected: 404 Not Found, NOT 500
url: http://{{baseUrl}}/api/tin-hieu-sos/cap-nhat-trang-thai/?status=DANG_XU_LY
method: POST
queryParams:
  status: DANG_XU_LY
scripts:
  - type: afterResponse
    code: |
      pm.test("Status is 404 (Not Found)", function() {

          pm.response.to.have.status(404);

      });



      pm.test("Status is NOT 500", function() {

          pm.response.to.not.have.status(500);

      });
    language: text/javascript
order: 1000
