$kind: http-request
name: POST TC_08 - Cập nhật SOS với status không hợp lệ (Negative)
description: |-
  Negative test: Cập nhật SOS với status không hợp lệ
  - Expected: Status 400 (Bad Request), NOT 500
url: http://{{baseUrl}}/api/tin-hieu-sos/cap-nhat-trang-thai/{{sos_id}}?status={{invalid_status}}
method: POST
queryParams:
  status: "{{invalid_status}}"
scripts:
  - type: afterResponse
    code: |
      pm.test("Status is 400 (Bad Request)", function() {

          pm.response.to.have.status(400);

      });



      pm.test("Status is NOT 500", function() {

          pm.response.to.not.have.status(500);

      });
    language: text/javascript
order: 5000
