$kind: http-request
description: |-
  Lấy danh sách tất cả trụ sở
  - Expected: Status 200, List of all stations
url: http://{{baseUrl}}/api/tru-so/all
method: GET
scripts:
  - type: afterResponse
    code: |
      pm.test("Status is 200", function() {

          pm.response.to.have.status(200);

      });



      pm.test("Response is array or list", function() {

          const body = pm.response.json();

          pm.expect(body).to.be.an('array');

      });
    language: text/javascript
order: 2000
