$kind: http-request
description: |-
  Đăng xuất tài khoản trụ sở
  - Expected: Status 200, Success message
  - Note: Run AFTER TC_01 for valid session
url: http://{{baseUrl}}/truso/logout
method: POST
scripts:
  - type: afterResponse
    code: |
      pm.test("Status is 200", function() {

          pm.response.to.have.status(200);

      });



      pm.test("Response contains success message", function() {

          const body = pm.response.json();

          pm.expect(body.message || body.data.message).to.include("Logout");

      });
    language: text/javascript
order: 1342
