$kind: http-request
name: GET TC_12 - Xem danh sách sự cố hiện tại của trụ sở
description: |-
  Lấy danh sách sự cố hiện tại của trụ sở
  - Expected: Status 200, List of current incidents
  - Note: Per source, may return empty list instead of 401 if not logged in (security consideration)
url: http://{{baseUrl}}/su-co/danh-sach-hien-tai
method: GET
scripts:
  - type: afterResponse
    code: |
      pm.test("Status is 200", function() {

          pm.response.to.have.status(200);

      });



      pm.test("Response is an array or object with data", function() {

          const body = pm.response.json();

          pm.expect(body).to.be.an('array');

      });
    language: text/javascript
order: 1000
