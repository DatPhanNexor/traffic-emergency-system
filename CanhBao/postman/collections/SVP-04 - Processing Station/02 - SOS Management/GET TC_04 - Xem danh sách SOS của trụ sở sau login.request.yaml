$kind: http-request
description: |-
  Lấy danh sách SOS của trụ sở sau login
  - Expected: Status 200, List of SOS
  - Requires: JSESSIONID session (run after TC_01)
url: http://{{baseUrl}}/truso/api/sos-cua-toi
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200", function() {
          pm.response.to.have.status(200);
      });

      pm.test("Response is an array or object with data", function() {
          const body = pm.response.json();
          pm.expect(body).to.satisfy(function(val) {
              return Array.isArray(val) || (typeof val === 'object' && val !== null);
          }, "Expected response to be an array or object");
      });
    language: text/javascript
order: 1000
