$kind: http-request
description: |-
  Xem lịch sử xử lý sự cố của trụ sở
  - Expected: 200 if logged in with history list, 401 if not logged in
  - Requires: JSESSIONID session
url: http://{{baseUrl}}/su-co/lich-su
method: GET
scripts:
  - type: afterResponse
    code: |
      pm.test("Status is 200 or 401", function() {

          const status = pm.response.code;

          pm.expect([200, 401]).to.include(status);

      });



      pm.test("Response is array or object", function() {

          const body = pm.response.json();

          pm.expect(body).to.be.an('array');

      });
    language: text/javascript
order: 3000
