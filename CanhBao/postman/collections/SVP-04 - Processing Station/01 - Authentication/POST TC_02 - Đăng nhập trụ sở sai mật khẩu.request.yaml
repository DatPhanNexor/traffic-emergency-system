$kind: http-request
description: |-
  Negative test: Đăng nhập với mật khẩu sai
  - Expected: Status 401, Error message, NOT 500
url: http://{{baseUrl}}/truso/login
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    username: "{{stationLogin}}"
    password: wrongpassword
scripts:
  - type: afterResponse
    code: |
      pm.test("Status is 401", function() {

          pm.response.to.have.status(401);

      });



      pm.test("Response contains error message", function() {

          const body = pm.response.json();

          pm.expect(body.message).to.include("Sai tài khoản hoặc mật khẩu");

      });



      pm.test("Status is NOT 500", function() {

          pm.response.to.not.have.status(500);

      });
    language: text/javascript
order: 2000
