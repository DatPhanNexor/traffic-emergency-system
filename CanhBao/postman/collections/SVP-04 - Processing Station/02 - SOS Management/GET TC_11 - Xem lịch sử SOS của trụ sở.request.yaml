$kind: http-request
description: |-
  Xem lịch sử SOS của trụ sở
  - Expected: 200 if logged in, 401 if not logged in
  - Requires: JSESSIONID session
url: http://{{baseUrl}}/api/tin-hieu-sos/history
method: GET
scripts:
  - type: afterResponse
    code: |
      pm.test("Status is 200 or 401", function() {

          const status = pm.response.code;

          pm.expect([200, 401]).to.include(status);

      });
    language: text/javascript
order: 8000
