$kind: http-request
description: |-
  Cập nhật mức độ sự cố
  - Expected: 200 if valid, 401 if no session
  - NOT 500
  - Body: {"mucDo": "CAO"} (or BAO, etc.)
  - Requires: Valid {{report_id}}, login session
url: http://{{baseUrl}}/su-co/cap-nhat-muc-do/{{report_id}}
method: PATCH
headers:
  Content-Type: application/json
body:
  type: text
  content: '{"mucDo": "CAO"}'
scripts:
  - type: afterResponse
    code: |
      pm.test("Status is 200 or 404", function() {
          const status = pm.response.code;
          pm.expect([200, 404]).to.include(status);
      });

      pm.test("Response contains message or ketQua", function() {
          const body = pm.response.json();
          pm.expect(body.message || body.ketQua || body.data || body.error).to.exist;
      });



      pm.test("Status is NOT 500", function() {

          pm.response.to.not.have.status(500);

      });
    language: text/javascript
order: 5000
