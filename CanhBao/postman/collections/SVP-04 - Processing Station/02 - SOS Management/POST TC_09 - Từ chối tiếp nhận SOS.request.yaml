$kind: http-request
description: |-
  Từ chối tiếp nhận SOS
  - Expected: Status 200, message/ketQua in response
  - Requires: Valid {{sos_id}}, {{truso_id}}, login session
url: http://{{baseUrl}}/api/tin-hieu-sos/tu-choi/{{sos_id}}?idTruSo={{truso_id}}
method: POST
queryParams:
  idTruSo: "{{truso_id}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 or 404", function() {
          const status = pm.response.code;
          pm.expect([200, 404]).to.include(status);
      });

      pm.test("Response contains message or ketQua", function() {
          const body = pm.response.json();
          pm.expect(body.message || body.ketQua || body.data || body.error).to.exist;
      });
    language: text/javascript
order: 6000
