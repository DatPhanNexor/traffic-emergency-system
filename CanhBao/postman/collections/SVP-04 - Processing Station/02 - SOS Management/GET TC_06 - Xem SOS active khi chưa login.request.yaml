$kind: http-request
description: |-
  Negative test: Xem SOS active khi chưa login
  - Expected: Status 401
  - Note: Run WITHOUT login session (or after logout)
url: http://{{baseUrl}}/api/tin-hieu-sos/active
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200", function() {
          pm.response.to.have.status(200);
      });

      pm.test("Response is an array or list", function() {
          const body = pm.response.json();
          pm.expect(body).to.be.an('array');
      });
    language: text/javascript
order: 3000
