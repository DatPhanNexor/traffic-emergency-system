$kind: http-request
description: |-
  Negative test: Update incident status với ID không tồn tại
  - Expected: 404 Not Found, NOT 500
url: http://{{baseUrl}}/su-co/cap-nhat-trang-thai/
method: PATCH
headers:
  Content-Type: application/json
body:
  type: text
  content: '{"status": "DANG_XU_LY"}'
scripts:
  - type: afterResponse
    code: |
      pm.test("Status is 404 (Not Found)", function() {

          pm.response.to.have.status(404);

      });



      pm.test("Status is NOT 500", function() {

          pm.response.to.not.have.status(500);

      });
    language: text/javascript
order: 2000
